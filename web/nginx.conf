server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any route the client router owns.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config is regenerated per environment — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
