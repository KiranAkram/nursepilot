name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: dev

    env:
      RESOURCE_GROUP: shuaw_testing
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy api
        run: |
          az containerapp update \
            --name nursepilot-dev-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ env.SHA }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy worker
        run: |
          az containerapp update \
            --name nursepilot-dev-worker \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-worker:${{ env.SHA }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Health check dev
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health")
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $status), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging

    env:
      RESOURCE_GROUP: shuaw_testing
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy api
        run: |
          az containerapp update \
            --name nursepilot-staging-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ env.SHA }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy worker
        run: |
          az containerapp update \
            --name nursepilot-staging-worker \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-worker:${{ env.SHA }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Health check staging
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health")
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $status), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1
