name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Image SHA to deploy (from a successful CI publish run)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod

    env:
      RESOURCE_GROUP: shuaw_testing

    steps:
      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy api
        run: |
          az containerapp update \
            --name nursepilot-prod-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ inputs.image_sha }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      - name: Deploy worker
        run: |
          az containerapp update \
            --name nursepilot-prod-worker \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-worker:${{ inputs.image_sha }} \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              REDIS_URL="${{ secrets.REDIS_URL }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      - name: Deploy web
        run: |
          az containerapp update \
            --name nursepilot-prod-web \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/nursepilot-web:${{ inputs.image_sha }} \
            --set-env-vars \
              API_URL="${{ vars.API_URL }}"

      - name: Health check
        id: healthcheck
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health")
            if [ "$status" = "200" ]; then
              echo "result=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i failed (HTTP $status), retrying in 10s..."
            sleep 10
          done
          echo "result=failure" >> $GITHUB_OUTPUT
          exit 1

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.healthcheck.outputs.result }}" = "success" ]; then
            echo "### Deployment successful" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ inputs.image_sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- URL: ${{ vars.API_URL }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deployment failed" >> $GITHUB_STEP_SUMMARY
            echo "- Health check did not return 200 after 3 attempts" >> $GITHUB_STEP_SUMMARY
            echo "- Image: \`${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ inputs.image_sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
