name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install ruff
        run: uv tool install ruff

      - name: Lint api
        run: ruff check api/

      - name: Lint worker
        run: ruff check worker/

      - name: Lint shared
        run: ruff check shared/

      - name: Lint migrations
        run: ruff check migrations/

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nursepilot
          POSTGRES_PASSWORD: nursepilot
          POSTGRES_DB: nursepilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nursepilot -d nursepilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://nursepilot:nursepilot@localhost:5432/nursepilot_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Test api
        working-directory: api
        run: |
          uv sync --group dev
          uv run pytest tests/

      - name: Test worker
        working-directory: worker
        run: |
          uv sync --group dev
          uv run pytest tests/

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Typecheck and build
        working-directory: web
        run: npm run build

      - name: Build web image
        run: docker build -f web/Dockerfile web/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f api/Dockerfile .

      - name: Build worker image
        run: docker build -f worker/Dockerfile .

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [lint, test, build, web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nursepilot-api:latest
            ${{ env.IMAGE_PREFIX }}/nursepilot-api:${{ github.sha }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nursepilot-worker:latest
            ${{ env.IMAGE_PREFIX }}/nursepilot-worker:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nursepilot-web:latest
            ${{ env.IMAGE_PREFIX }}/nursepilot-web:${{ github.sha }}
